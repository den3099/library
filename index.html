<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <main>
        <h1>Library</h1>
        <section id="book-section">
            <h2>Available Books</h2>
            <div id="book-list"></div>
            <button id="new-book-btn" type="button">New Book</button>
            <dialog id="new-book-dialog">
                <form id="new-book-form">
                    <legend>New Book</legend>

                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author">

                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title">

                    <label for="pages">Number of Pages:</label>
                    <input type="number" id="pages" min="1" name="pages">

                    <fieldset>
                        <legend>Select the read status for the book</legend>

                        <label for="status-read">Read</label>
                        <input type="radio" id="status-read" name="status" value="read" checked>

                        <label for="status-reading">Reading</label>
                        <input type="radio" id="status-reading" name="status" value="reading">

                        <label for="status-pending">Pending</label>
                        <input type="radio" id="status-pending" name="status" value="pending">

                        <label for="status-abandoned">Abandoned</label>
                        <input type="radio" id="status-abandoned" name="status" value="abandoned">
                    </fieldset>
                    <button type="submit" id="form-btn">Confirm</button>
                </form>
            </dialog>
        </section>
    </main>
</body>
</html>
